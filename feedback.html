<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">Feedback</a>
        <a href="dashboard.html" class="btn btn-light">Back to Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <h3>Feedback Form</h3>

    <input type="text" id="fname" class="form-control mb-2" placeholder="Name">
    <textarea id="comments" class="form-control mb-2" placeholder="Comments"></textarea>

    <select id="rating" class="form-control mb-2">
        <option value="">Rating</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
    </select>

    <button class="btn btn-success" onclick="submitFeedback()">Submit</button>
</div>

<script src="script.js"></script>

</body>
</html>
